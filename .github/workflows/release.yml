name: Create release

on:
  push:
    tags: 'v*'

jobs:
  release:
    name: 'Create draft release'
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@2.37.2
        with:
          php-version: 7.4
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        uses: nick-fields/retry@v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 5
          command: composer update --no-interaction --no-progress

      - name: Build release asset
        run: make dist/psysh-${{ github.ref_name }}.tar.gz

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --draft \
            --title "PsySH ${{ github.ref_name }}" \
            --notes "$(cat <<'EOF'
          New:
           - ...

          Improved:
           - ...

          Removed:
           - ...
          EOF
          )" \
            ./dist/psysh-${{ github.ref_name }}.tar.gz
